// STORAGE
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = "tfk-progress-v1";
function todayStr() { return new Date().toISOString().slice(0, 10); }
function calcStreak(dates) {
  if (!dates || dates.length === 0) return 0;
  const sorted = [...new Set(dates)].sort().reverse();
  const today = todayStr();
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (sorted[0] !== today && sorted[0] !== yesterday) return 0;
  let s = 1;
  for (let i = 1; i < sorted.length; i++) {
    const prev = new Date(sorted[i - 1] + "T00:00:00");
    const curr = new Date(sorted[i] + "T00:00:00");
    if ((prev - curr) / 86400000 === 1) s++; else break;
  }
  return s;
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [currentDay, setCurrentDay] = useState(0);
  const [completed, setCompleted] = useState({});
  const [cardStatus, setCardStatus] = useState({});
  const [flipped, setFlipped] = useState({});
  const [view, setView] = useState("lesson");
  const [reminderTime, setReminderTime] = useState("09:00");
  const [reminderSet, setReminderSet] = useState(false);
  const [notifPermission, setNotifPermission] = useState("default");
  const [streak, setStreak] = useState(0);
  const [completionDates, setCompletionDates] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saveStatus, setSaveStatus] = useState("");
  const [userCodes, setUserCodes] = useState({});
  const [exerciseFeedback, setExerciseFeedback] = useState({});
  const [checking, setChecking] = useState(false);
  const intervalRef = useRef(null);
  const initDone = useRef(false);

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const d = JSON.parse(saved);
        setCurrentDay(d.currentDay ?? 0); setCompleted(d.completed ?? {});
        setCardStatus(d.cardStatus ?? {}); setReminderTime(d.reminderTime ?? "09:00");
        setCompletionDates(d.completionDates ?? []); setUserCodes(d.userCodes ?? {});
      }
    } catch (e) {}
    setLoading(false);
    setTimeout(() => { initDone.current = true; }, 300);
  }, []);

  useEffect(() => {
    if (!initDone.current) return;
    setSaveStatus("saving");
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentDay, completed, cardStatus, reminderTime, completionDates, userCodes }));
      setSaveStatus("saved");
    } catch { setSaveStatus("error"); }
    setTimeout(() => setSaveStatus(""), 2000);
  }, [currentDay, completed, cardStatus, reminderTime, completionDates, userCodes]);

  const resetProgress = () => {
    setCurrentDay(0); setCompleted({}); setCardStatus({}); setCompletionDates([]);
    setFlipped({}); setStreak(0); setUserCodes({}); setExerciseFeedback({});
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
  };

  const lesson = LESSONS[currentDay];
  const totalCompleted = Object.keys(completed).length;
  const totalCards = LESSONS.reduce((s, l) => s + l.cards.length, 0);
  const gotCards = Object.values(cardStatus).filter(s => s === "got").length;
  const reviewCards = Object.values(cardStatus).filter(s => s === "review").length;
  const exercisesDone = Object.keys(userCodes).filter(k => userCodes[k]?.trim()).length;

  useEffect(() => { setStreak(calcStreak(completionDates)); }, [completionDates]);

  const markComplete = () => {
    const today = todayStr();
    setCompleted(p => ({ ...p, [currentDay]: true }));
    setCompletionDates(p => p.includes(today) ? p : [...p, today]);
    if (currentDay < LESSONS.length - 1) {
      setCurrentDay(currentDay + 1); setFlipped({}); window.scrollTo(0, 0);
    }
  };
  const markCard = (di, ci, s) => setCardStatus(p => ({ ...p, [`${di}-${ci}`]: s }));
  const updateCode = (code) => setUserCodes(p => ({ ...p, [currentDay]: code }));

  const checkCode = async () => {
    const code = userCodes[currentDay] || "";
    if (!code.trim()) return;
    setChecking(true);
    setExerciseFeedback(p => ({ ...p, [currentDay]: null }));
    try {
      const ex = lesson.exercise;
      const topics = LESSONS.slice(0, currentDay + 1).map(l => `Day ${l.day}: ${l.title}`).join(", ");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          system: `You are a Python tutor for a data science course. Topics covered so far: ${topics}. Review the student's code for the exercise. Be encouraging but precise. If correct, confirm clearly and note what's done well. If issues exist, explain what's wrong and nudge toward the fix WITHOUT giving the full answer. Keep to 3-6 sentences. Plain text only, no markdown formatting.`,
          messages: [{ role: "user", content: `Exercise: ${ex.prompt}\n\nModel solution for reference:\n${ex.solution}\n\nStudent code:\n${code}\n\nReview:` }]
        })
      });
      const data = await res.json();
      const text = data.content?.map(b => b.text || "").join("\n") || "Unable to get feedback.";
      const good = /correct|great|well done|good job|looks good|nicely|excellent|perfect|solid/i.test(text);
      setExerciseFeedback(p => ({ ...p, [currentDay]: { text, type: good ? "success" : "error" } }));
    } catch {
      setExerciseFeedback(p => ({ ...p, [currentDay]: { text: "Couldn't reach the AI reviewer. Try again, or use 'Show Solution' to compare.", type: "info" } }));
    }
    setChecking(false);
  };

  const setupReminder = async () => {
    if ("Notification" in window) {
      const p = await Notification.requestPermission();
      setNotifPermission(p);
      if (p !== "granted") return;
    } else return;
    if (intervalRef.current) clearInterval(intervalRef.current);
    setReminderSet(true);
    intervalRef.current = setInterval(() => {
      const now = new Date();
      const [h, m] = reminderTime.split(":").map(Number);
      if (now.getHours() === h && now.getMinutes() === m && now.getSeconds() < 30)
        new Notification("Python Lesson Time!", { body: `Day ${currentDay + 1}: ${LESSONS[Math.min(currentDay, LESSONS.length - 1)].title}` });
    }, 15000);
  };
  useEffect(() => () => { if (intervalRef.current) clearInterval(intervalRef.current); }, []);

  const bg = "#0e0c15", surface = "#16131f", accent = "#c9a227", accentDim = "rgba(201,162,39,0.15)";
  const textPrimary = "#f0e6d3", textSecondary = "#8a8098";
  const navBtn = (active) => ({
    padding: "10px 0", fontSize: "11px", fontWeight: 600, letterSpacing: "1.5px", textTransform: "uppercase",
    border: "none", background: "transparent", color: active ? accent : textSecondary, cursor: "pointer",
    borderBottom: active ? `2px solid ${accent}` : "2px solid transparent", fontFamily: "inherit"
  });

  if (loading) return (
    <div style={{ minHeight: "100vh", background: bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', system-ui" }}>
      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "32px", fontWeight: 800, background: `linear-gradient(135deg, ${accent}, #e8d48b)`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", marginBottom: "16px" }}>TF/K</div>
      <div style={{ color: textSecondary, fontSize: "14px" }}>Loading your progress...</div>
      <div style={{ width: "40px", height: "40px", border: "3px solid rgba(255,255,255,0.08)", borderTopColor: accent, borderRadius: "50%", marginTop: "20px", animation: "spin 0.8s linear infinite" }} />
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: bg, color: textPrimary, fontFamily: "'DM Sans', system-ui, sans-serif" }}>

      {saveStatus && (
        <div style={{
          position: "fixed", top: "12px", right: "12px", zIndex: 100, padding: "8px 14px", borderRadius: "8px",
          fontSize: "11px", fontWeight: 600, letterSpacing: "1px",
          background: saveStatus === "saved" ? "rgba(100,200,100,0.15)" : saveStatus === "error" ? "rgba(200,80,80,0.15)" : "rgba(200,170,50,0.15)",
          color: saveStatus === "saved" ? "#90d090" : saveStatus === "error" ? "#e07070" : "#d0b060",
        }}>{saveStatus === "saving" ? "Saving..." : saveStatus === "saved" ? "Saved" : "Save failed"}</div>
      )}

      <div style={{ background: surface, borderBottom: "1px solid rgba(255,255,255,0.05)", padding: "20px 24px 0" }}>
        <div style={{ maxWidth: "640px", margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "18px" }}>
            <div>
              <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "22px", fontWeight: 800, margin: 0, background: `linear-gradient(135deg, ${accent}, #e8d48b)`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>TF/K</h1>
              <p style={{ margin: "2px 0 0", fontSize: "11px", color: textSecondary, letterSpacing: "1px" }}>ML WITH TENSORFLOW & KERAS</p>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: "24px", fontWeight: 700, color: accent }}>{totalCompleted}<span style={{ fontSize: "14px", color: textSecondary }}>/{LESSONS.length}</span></div>
              <div style={{ fontSize: "10px", color: textSecondary, letterSpacing: "1px" }}>LESSONS DONE</div>
            </div>
          </div>
          <div style={{ height: "3px", background: "rgba(255,255,255,0.05)", borderRadius: "2px", marginBottom: "16px" }}>
            <div style={{ height: "100%", width: `${(totalCompleted / LESSONS.length) * 100}%`, background: `linear-gradient(90deg, ${accent}, #e8d48b)`, borderRadius: "2px", transition: "width 0.5s ease" }} />
          </div>
          <div style={{ display: "flex", gap: "24px" }}>
            {["lesson", "progress", "review", "reminders"].map(v => (
              <button key={v} style={navBtn(view === v)} onClick={() => setView(v)}>{v}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: "640px", margin: "0 auto", padding: "24px 24px 100px" }}>

        {view === "lesson" && (
          <div>
            <div style={{ display: "flex", gap: "6px", flexWrap: "wrap", marginBottom: "24px" }}>
              {LESSONS.map((l, i) => (
                <button key={i} onClick={() => { setCurrentDay(i); setFlipped({}); }} style={{
                  width: "32px", height: "32px", borderRadius: "8px",
                  border: i === currentDay ? `2px solid ${accent}` : "1px solid rgba(255,255,255,0.08)",
                  background: completed[i] ? accentDim : "transparent",
                  color: i === currentDay ? accent : completed[i] ? "#c9a227aa" : textSecondary,
                  fontSize: "12px", fontWeight: i === currentDay ? 700 : 500,
                  cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center"
                }}>{i + 1}</button>
              ))}
            </div>

            <div style={{ background: surface, borderRadius: "16px", padding: "28px 24px", border: "1px solid rgba(255,255,255,0.05)", marginBottom: "24px" }}>
              <div style={{ fontSize: "10px", color: accent, letterSpacing: "2px", textTransform: "uppercase", marginBottom: "6px", fontWeight: 600 }}>Day {lesson.day} of 30</div>
              <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "24px", fontWeight: 700, margin: "0 0 20px", color: textPrimary }}>{lesson.title}</h2>
              <div>{renderContent(lesson.content)}</div>
            </div>

            <CodeExercise exercise={lesson.exercise} dayIndex={currentDay}
              userCode={userCodes[currentDay] || ""} onCodeChange={updateCode}
              feedback={exerciseFeedback[currentDay]} onCheckCode={checkCode}
              onClearFeedback={() => setExerciseFeedback(p => ({ ...p, [currentDay]: null }))}
              checking={checking}
            />

            <div style={{ marginBottom: "24px" }}>
              <h3 style={{ fontSize: "12px", letterSpacing: "2px", textTransform: "uppercase", color: textSecondary, marginBottom: "14px", fontWeight: 600 }}>Flashcards</h3>
              <div style={{ minHeight: `${lesson.cards.length * 146}px` }}>
                {lesson.cards.map((card, ci) => (
                  <Flashcard key={`${currentDay}-${ci}`} card={card} index={ci}
                    flipped={!!flipped[`${currentDay}-${ci}`]}
                    onFlip={() => setFlipped(p => ({ ...p, [`${currentDay}-${ci}`]: !p[`${currentDay}-${ci}`] }))}
                    onMark={(s) => markCard(currentDay, ci, s)} status={cardStatus[`${currentDay}-${ci}`]}
                  />
                ))}
              </div>
            </div>

            <button onClick={markComplete} style={{
              width: "100%", padding: "16px", borderRadius: "12px", border: "none",
              background: completed[currentDay] ? "rgba(100,200,100,0.15)" : `linear-gradient(135deg, ${accent}, #b8911f)`,
              color: completed[currentDay] ? "#90d090" : "#0e0c15",
              fontSize: "14px", fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
            }}>{completed[currentDay] ? "Completed -- Next Lesson" : "Mark Complete & Continue"}</button>
          </div>
        )}

        {view === "progress" && (
          <div>
            <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "24px", marginBottom: "24px" }}>Your Progress</h2>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "32px" }}>
              {[
                { label: "Streak", value: `${streak} day${streak !== 1 ? "s" : ""}`, icon: "\uD83D\uDD25" },
                { label: "Completed", value: `${totalCompleted}/${LESSONS.length}`, icon: "\uD83D\uDCD6" },
                { label: "Cards Learned", value: `${gotCards}/${totalCards}`, icon: "\u2713" },
                { label: "Exercises Done", value: `${exercisesDone}/${LESSONS.length}`, icon: "\uD83D\uDCBB" },
              ].map((s, i) => (
                <div key={i} style={{ background: surface, borderRadius: "14px", padding: "20px", border: "1px solid rgba(255,255,255,0.05)", textAlign: "center" }}>
                  <div style={{ fontSize: "24px", marginBottom: "6px" }}>{s.icon}</div>
                  <div style={{ fontSize: "22px", fontWeight: 700, color: accent }}>{s.value}</div>
                  <div style={{ fontSize: "11px", color: textSecondary, letterSpacing: "1px", textTransform: "uppercase", marginTop: "4px" }}>{s.label}</div>
                </div>
              ))}
            </div>
            <h3 style={{ fontSize: "12px", letterSpacing: "2px", textTransform: "uppercase", color: textSecondary, marginBottom: "14px", fontWeight: 600 }}>All Lessons</h3>
            {LESSONS.map((l, i) => (
              <div key={i} onClick={() => { setCurrentDay(i); setView("lesson"); setFlipped({}); }} style={{
                display: "flex", alignItems: "center", gap: "14px", padding: "14px 16px", background: surface,
                borderRadius: "12px", marginBottom: "8px", cursor: "pointer", border: "1px solid rgba(255,255,255,0.04)",
              }}>
                <div style={{
                  width: "34px", height: "34px", borderRadius: "10px",
                  background: completed[i] ? accentDim : "rgba(255,255,255,0.04)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "13px", fontWeight: 700, color: completed[i] ? accent : textSecondary, flexShrink: 0,
                }}>{completed[i] ? "\u2713" : i + 1}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: "14px", fontWeight: 600, color: completed[i] ? textPrimary : textSecondary }}>{l.title}</div>
                  <div style={{ fontSize: "11px", color: textSecondary, marginTop: "2px" }}>
                    Day {l.day} {Array.from({length:5},(_,x)=> x < l.exercise.difficulty ? "\u2605" : "\u2606").join("")}
                  </div>
                </div>
                {userCodes[i]?.trim() && <div style={{ fontSize: "10px", color: "#6a9fc0", fontWeight: 600, background: "rgba(100,150,200,0.1)", padding: "3px 8px", borderRadius: "6px" }}>CODE</div>}
              </div>
            ))}
            <ResetButton onReset={resetProgress} textSecondary={textSecondary} surface={surface} />
          </div>
        )}

        {view === "review" && (
          <div>
            <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "24px", marginBottom: "8px" }}>Flashcard Review</h2>
            <p style={{ color: textSecondary, marginBottom: "24px", fontSize: "14px" }}>Cards marked for review or not yet seen.</p>
            {(() => {
              const list = [];
              LESSONS.forEach((l, di) => l.cards.forEach((c, ci) => {
                const k = `${di}-${ci}`;
                if (cardStatus[k] === "review" || !cardStatus[k]) list.push({ ...c, di, ci, key: k });
              }));
              if (!list.length) return (
                <div style={{ textAlign: "center", padding: "60px 0", color: textSecondary }}>
                  <div style={{ fontSize: "40px", marginBottom: "16px" }}>All caught up!</div>
                  <div style={{ fontSize: "13px" }}>No cards left to review.</div>
                </div>
              );
              return <>
                <div style={{ fontSize: "13px", color: textSecondary, marginBottom: "16px" }}>{list.length} card{list.length !== 1 ? "s" : ""}</div>
                {list.map(c => (
                  <div key={c.key} style={{ marginBottom: "4px" }}>
                    <div style={{ fontSize: "10px", color: textSecondary, marginBottom: "4px", marginLeft: "4px" }}>Day {c.di + 1}: {LESSONS[c.di].title}</div>
                    <Flashcard card={c} index={c.ci} flipped={!!flipped[c.key]}
                      onFlip={() => setFlipped(p => ({ ...p, [c.key]: !p[c.key] }))}
                      onMark={(s) => markCard(c.di, c.ci, s)} status={cardStatus[c.key]} />
                  </div>
                ))}
              </>;
            })()}
          </div>
        )}

        {view === "reminders" && (
          <div>
            <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "24px", marginBottom: "8px" }}>Daily Reminders</h2>
            <p style={{ color: textSecondary, marginBottom: "32px", fontSize: "14px" }}>Get a browser notification each day to study.</p>
            <div style={{ background: surface, borderRadius: "16px", padding: "32px 24px", border: "1px solid rgba(255,255,255,0.05)", textAlign: "center" }}>
              <div style={{ fontSize: "48px", marginBottom: "20px" }}>&#9200;</div>
              <label style={{ fontSize: "12px", letterSpacing: "2px", textTransform: "uppercase", color: textSecondary, display: "block", marginBottom: "12px" }}>Reminder Time</label>
              <input type="time" value={reminderTime} onChange={e => { setReminderTime(e.target.value); setReminderSet(false); }}
                style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "10px", padding: "14px 20px", color: textPrimary, fontSize: "24px", fontFamily: "'Source Code Pro', monospace", textAlign: "center", outline: "none", width: "180px" }} />
              <br />
              <button onClick={setupReminder} style={{
                marginTop: "20px", padding: "14px 40px", borderRadius: "12px", border: "none",
                background: reminderSet ? "rgba(100,200,100,0.15)" : `linear-gradient(135deg, ${accent}, #b8911f)`,
                color: reminderSet ? "#90d090" : "#0e0c15", fontSize: "14px", fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
              }}>{reminderSet ? "Reminder Active" : "Enable Reminder"}</button>
              {notifPermission === "denied" && <p style={{ color: "#e07070", marginTop: "16px", fontSize: "13px" }}>Notifications blocked. Enable in browser settings.</p>}
              <div style={{ marginTop: "28px", padding: "16px", background: "rgba(255,255,255,0.03)", borderRadius: "10px", fontSize: "13px", color: textSecondary, lineHeight: 1.6 }}>
                <strong style={{ color: textPrimary }}>How it works:</strong><br />Keep this tab open to get a daily notification at your chosen time.
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
